<svg width="800" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Lighting -->
  <g id="illumination_not_illuminated_street">
    <line x1="50" y1="50" x2="325" y2="50" stroke="#f7696b" stroke-width="69" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="325" y2="50" stroke="white" stroke-width="19" stroke-linecap="round"/>
  </g>
  <g id="illumination_illuminated_street">
    <line x1="50" y1="130" x2="330" y2="130" stroke="#efe78c" stroke-width="69" stroke-linecap="round"/>
    <line x1="50" y1="130" x2="330" y2="130" stroke="white" stroke-width="19" stroke-linecap="round"/>
  </g>
  <g id="illumination_underground_illuminated_way">
    <line x1="50" y1="210" x2="325" y2="210" stroke="#efe78c" stroke-width="19" stroke-dasharray="15 7"/>
    <line x1="50" y1="210" x2="325" y2="210" stroke="lightgrey" stroke-width="2" stroke-dasharray="4 2"/>
  </g>
  <g id="illumination_temporarily_illuminated_street">
    <line x1="50" y1="290" x2="370" y2="290" stroke="#efe78c" stroke-width="69" stroke-dasharray="30 16"/>
    <line x1="50" y1="290" x2="370" y2="290" stroke="lightgrey" stroke-width="19" stroke-linecap="round"/>
    <line x1="50" y1="290" x2="370" y2="290" stroke="white" stroke-width="15" stroke-linecap="round"/>
  </g>
</svg>
