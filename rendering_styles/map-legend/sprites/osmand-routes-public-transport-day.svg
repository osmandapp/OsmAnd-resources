    <circle cx="178" cy="230" r="8" fill="green" />
    <circle cx="194" cy="230" r="8" fill="green" />
    <circle cx="210" cy="230" r="8" fill="green" />
    <circle cx="226" cy="230" r="8" fill="green" />
    <circle cx="242" cy="230" r="8" fill="green" />
