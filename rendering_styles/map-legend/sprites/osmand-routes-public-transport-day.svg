    <line x1="50" y1="110" x2="325" y2="110" stroke="white" stroke-width="17" stroke-linecap="round"/>
    <line x1="50" y1="110" x2="325" y2="110" stroke="purple" stroke-width="11" stroke-linecap="round"/>
  </g>
  <g id="transport_tram">
