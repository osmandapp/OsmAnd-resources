<svg width="800" height="1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Linear barriers -->
  <g id="barriers_regular">
    <line x1="50" y1="50" x2="370" y2="50" stroke="black" stroke-width="1"/>
  </g>
  <g id="barriers_ditch">
    <line x1="50" y1="80" x2="370" y2="80" stroke="#738e8c" stroke-width="2"/>
  </g>
  <g id="barriers_hedge">
    <line x1="50" y1="110" x2="370" y2="110" stroke="#add3a5" stroke-width="2"/>
  </g>
  <g id="barriers_city_wall">
    <line x1="50" y1="140" x2="370" y2="140" stroke="#8c8a8c" stroke-width="8"/>
  </g>
  <g id="barriers_retaining_wall">
    <line x1="50" y1="170" x2="370" y2="170" stroke="darkgrey" stroke-width="1"/>
  </g>
  <g id="barriers_embankment">
    <line x1="50" y1="200" x2="370" y2="200" stroke="#cecbc6" stroke-width="9" stroke-linecap="round"/>
    <line x1="50" y1="200" x2="370" y2="200" stroke="#bdbab5" stroke-width="31" stroke-dasharray="1 25"/>
  </g>
  <g id="barriers_barrier_embankment">
    <line x1="50" y1="230" x2="370" y2="230" stroke="#cecbc6" stroke-width="7" stroke-linecap="round"/>
    <line x1="50" y1="230" x2="370" y2="230" stroke="#bdbab5" stroke-width="18" stroke-dasharray="1 17"/>
  </g>
</svg>
